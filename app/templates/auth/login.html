{% extends "base.html" %}
{% block content %}

<link rel="stylesheet" href="{{ url_for('static', path='css/auth-login.css') }}">

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="auth-title">Вход в The Last Reality</h1>
            <p class="auth-subtitle">Войдите, чтобы продолжить эпическое путешествие</p>
        </div>

        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="email" class="label-small">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    class="input-modern"
                    placeholder="your@email.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password" class="label-small">Пароль</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    class="input-modern"
                    placeholder="••••••••"
                    required
                >
            </div>

            <button type="submit" class="btn-primary btn-full">
                <span class="icon">🔓</span>
                Войти
            </button>
        </form>

        <!-- Google Login -->
        {% if firebase_enabled %}
        <div class="auth-divider">
            <span>или</span>
        </div>

        <button id="googleLoginBtn" class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20" height="20">
            Войти через Google
        </button>
        {% endif %}

        <div class="auth-footer">
            <p>Нет аккаунта? <a href="{{ url_for('register_page') }}" class="auth-link">Зарегистрироваться</a></p>
        </div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>
    </div>
</div>

<!-- Configuration for JS (safe, non-inline data) -->
<div id="appConfig" style="display:none;"
     data-firebase-enabled="{{ '1' if firebase_enabled else '0' }}"
     data-base-url="{{ base_url|default('/quest-app') }}"></div>

<script type="module" src="{{ url_for('static', path='js/login-auth.js') }}"></script>

{% endblock %}
